[project]
name = "analyst"
version = "0.1.0"
requires-python = ">=3.12"
dependencies = [
    "fastapi",
    "uvicorn[standard]",
    "python-multipart",
    "sqlalchemy>=2.0",
    "alembic",
    "aiosqlite",
    "pydantic>=2.0",
    "pydantic-settings",
    "google-generativeai",
    "duckdb>=1.0",
    "structlog",
    "python-dotenv",
    "sqlglot",
    "itsdangerous",
]

[dependency-groups]
dev = [
    "pytest",
    "pytest-asyncio",
    "pytest-cov",
    "httpx",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/analyst"]

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"
pythonpath = ["src"]
markers = ["integration: marks tests requiring real API keys"]
