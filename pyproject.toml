[project]
name = "data-analyst-agent"
version = "0.1.0"
description = "Ask natural-language questions over uploaded datasets — powered by Gemini 2.5 Flash + DuckDB"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "pydantic-settings>=2.0",
    "aiosqlite>=0.20",
    "duckdb>=1.1",
    "pandas>=2.2",
    "openpyxl>=3.1",
    "python-multipart>=0.0.9",
    "structlog>=24.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "httpx>=0.27",
    "ruff>=0.6",
]
llm = [
    "google-genai>=0.8",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
