[project]
name = "data-analyst"
version = "0.1.0"
description = "Senior Data Analyst Agent — store datasets, query across them in natural language, with audit logging."
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.115",
    "uvicorn[standard]>=0.30",
    "jinja2>=3.1",
    "python-multipart>=0.0.9",
    "sqlalchemy>=2.0",
    "alembic>=1.13",
    "duckdb>=1.1",
    "pyarrow>=17.0",
    "pandas>=2.2",
    "langgraph>=0.2",
    "google-genai>=0.8",
    "pydantic>=2.7",
    "pydantic-settings>=2.3",
    "structlog>=24.1",
]

[dependency-groups]
dev = [
    "pytest>=8.2",
    "httpx>=0.27",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/data_analyst"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["src"]
filterwarnings = [
    "ignore:Field name \"schema_json\".*:UserWarning",
    "ignore:Using `httpx` with `starlette.testclient`.*:DeprecationWarning",
]
